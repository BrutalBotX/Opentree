name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtwebengine qtwebchannel'

      - name: Restore build docs
        run: |
          copy .\TIMELINE_PLAN.md .\github\TIMELINE_PLAN.md
          copy .\PROJECT_STATUS.md .\github\PROJECT_STATUS.md
        shell: cmd

      - name: Configure
        run: cmake -S . -B build-msvc -G "NMake Makefiles" -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-msvc --config Release

      - name: Package github docs
        run: |
          if not exist github mkdir github
          copy README.md github\README.md
          copy CHANGELOG.md github\CHANGELOG.md
          copy CONTRIBUTING.md github\CONTRIBUTING.md
          copy TIMELINE_PLAN.md github\TIMELINE_PLAN.md
          copy PROJECT_STATUS.md github\PROJECT_STATUS.md
        shell: cmd
